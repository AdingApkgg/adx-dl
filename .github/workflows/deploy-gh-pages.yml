name: Build and Publish gh-pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build catalog
        working-directory: pipeline
        run: python3 -c "from pathlib import Path; from tools.build_catalog import build_catalog; print(build_catalog(Path('..').resolve(), max_workers=16))"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prepare IndexNow key file
        working-directory: apps/web
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY || vars.INDEXNOW_KEY }}
        run: |
          if [ -n "$INDEXNOW_KEY" ]; then
            printf '%s' "$INDEXNOW_KEY" > "public/indexnow-$INDEXNOW_KEY.txt"
            echo "Prepared public/indexnow-$INDEXNOW_KEY.txt"
          else
            echo "INDEXNOW_KEY is not set; skipping key file generation"
          fi

      - name: Prepare CNAME file
        working-directory: apps/web
        env:
          SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || vars.INDEXNOW_SITE_URL }}
        run: |
          if [ -n "$SITE_URL" ]; then
            CNAME_DOMAIN="${SITE_URL#http://}"
            CNAME_DOMAIN="${CNAME_DOMAIN#https://}"
            CNAME_DOMAIN="${CNAME_DOMAIN%%/*}"
            if [ -n "$CNAME_DOMAIN" ]; then
              printf '%s' "$CNAME_DOMAIN" > "public/CNAME"
              echo "Prepared public/CNAME for $CNAME_DOMAIN"
            else
              echo "SITE_URL is set but could not be parsed; skipping CNAME generation"
            fi
          else
            echo "SITE_URL is not set; skipping CNAME generation"
          fi

      - name: Build site
        working-directory: apps/web
        env:
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
        run: bun run build

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apps/web/out
          publish_branch: gh-pages
          force_orphan: true

      - name: Submit IndexNow
        continue-on-error: true
        working-directory: apps/web
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY || vars.INDEXNOW_KEY }}
          INDEXNOW_SITE_URL: ${{ vars.INDEXNOW_SITE_URL || vars.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
        run: bun run submit:indexnow
