name: Build and Publish gh-pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build catalog
        working-directory: pipeline
        run: python3 -c "from pathlib import Path; from tools.build_catalog import build_catalog; print(build_catalog(Path('..').resolve(), max_workers=16))"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build site
        working-directory: apps/web
        run: bun run build

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apps/web/out
          publish_branch: gh-pages
          force_orphan: true

      - name: Submit IndexNow
        continue-on-error: true
        working-directory: apps/web
        # Key file, site URL, and CNAME all ship in the repo — no Actions secrets or variables needed.
        run: bun run submit:indexnow
