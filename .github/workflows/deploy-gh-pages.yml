name: Build and Publish gh-pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Artifact-based GitHub Pages deploy (no gh-pages branch).
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      # Cover mode switch: set repo variable ASTRODX_COVERS=remote to skip the
      # local mirror and use remote image links (default/unset = local AVIF+WebP).
      - name: Install libavif + libwebp (avifenc/cwebp for cover conversion)
        if: vars.ASTRODX_COVERS != 'remote'
        run: sudo apt-get update && sudo apt-get install -y libavif-bin webp

      # Reuse already-converted covers across runs: build_catalog skips any cover
      # whose AVIF+WebP already exist, so a restored cache turns the catalog step
      # from "download + encode 1562×2" into "only new/changed covers". Rolling
      # key (run_id) always saves a fresh cache; restore-keys grabs the latest.
      # Bump `covers-v1` -> `covers-v2` to force a full re-encode (e.g. quality
      # change, or an upstream cover swapped under the same slug).
      - name: Cache converted covers
        if: vars.ASTRODX_COVERS != 'remote'
        uses: actions/cache@v4
        with:
          path: apps/web/public/covers
          key: covers-v1-${{ github.run_id }}
          restore-keys: covers-v1-

      - name: Build catalog
        working-directory: pipeline
        env:
          ASTRODX_COVERS: ${{ vars.ASTRODX_COVERS }}
        run: python3 -c "from pathlib import Path; from tools.build_catalog import build_catalog; print(build_catalog(Path('..').resolve(), max_workers=16))"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Next.js build cache (module graph, compiled pages) across runs.
      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: apps/web/.next/cache
          key: next-${{ hashFiles('bun.lock') }}-${{ github.sha }}
          restore-keys: next-${{ hashFiles('bun.lock') }}-

      - name: Build site
        working-directory: apps/web
        run: bun run build

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./apps/web/out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Submit IndexNow
        continue-on-error: true
        working-directory: apps/web
        # Key file, site URL, and CNAME all ship in the repo — no Actions secrets or variables needed.
        run: bun run submit:indexnow
